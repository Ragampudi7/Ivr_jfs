# ==========================================
# 1. DATABASE CONNECTION (Aiven / MySQL)
# ==========================================
# These variables are automatically loaded by dotenv-java locally
# or injected by Render natively in the cloud.
spring.datasource.url=jdbc:mysql://mysql-3f085fd1-au20.l.aivencloud.com:22691/defaultdb?sslMode=REQUIRED
spring.datasource.username=avnadmin
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# 2. HIBERNATE & JPA CONFIG
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# 3. SERVER CONFIG
# ==========================================
server.port=8080

# ==========================================
# 4. LOGGING CONFIG
# ==========================================
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
